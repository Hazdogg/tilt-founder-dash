# Netlify configuration — Tilt Energy Founder Cockpit
# The site is a single static index.html, so there is no build step.

[build]
  publish = "."
  command = ""
  functions = "netlify/functions"

# Functions use the global fetch() built into Node 18+. Pin the runtime so a
# change to Netlify's default version can never break them.
[build.environment]
  NODE_VERSION = "20"

# Pretty API routes → serverless functions (live Shopify + Outlook)
[[redirects]]
  from = "/api/shopify"
  to = "/.netlify/functions/shopify"
  status = 200
[[redirects]]
  from = "/api/outlook"
  to = "/.netlify/functions/outlook"
  status = 200

# Serve index.html for any other path (SPA-style)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Reasonable security headers for a static app
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
